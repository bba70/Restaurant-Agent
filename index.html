<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食推荐 - Restaurant Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .main {
            padding: 40px 30px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-box button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .search-box button:active {
            transform: translateY(0);
        }

        .search-box button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            display: none;
        }

        .results.show {
            display: block;
        }

        .info-box {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: #333;
        }

        .info-value {
            color: #667eea;
            font-weight: 500;
        }

        .restaurants {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .restaurant-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .restaurant-card:hover {
            border-color: #667eea;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.1);
            transform: translateY(-5px);
        }

        .restaurant-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .restaurant-info {
            font-size: 13px;
            color: #666;
            line-height: 1.8;
        }

        .restaurant-info-item {
            display: flex;
            margin-bottom: 8px;
        }

        .restaurant-info-label {
            font-weight: 600;
            min-width: 60px;
            color: #333;
        }

        .restaurant-info-value {
            flex: 1;
            word-break: break-all;
        }

        .rating {
            display: inline-block;
            background: #ffc107;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            margin-top: 8px;
        }

        .cost {
            display: inline-block;
            background: #4caf50;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            margin-left: 8px;
            margin-top: 8px;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .footer {
            background: #f5f5f5;
            padding: 20px;
            text-align: center;
            color: #999;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 24px;
            }

            .main {
                padding: 20px;
            }

            .search-box {
                flex-direction: column;
            }

            .restaurants {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍜 美食推荐</h1>
            <p>智能 AI 推荐系统 - 找到你喜欢的餐厅</p>
        </div>

        <div class="main">
            <!-- 搜索框 -->
            <div class="search-box">
                <input 
                    type="text" 
                    id="queryInput" 
                    placeholder="例如：我在北京想吃川菜，价格100元以下"
                    onkeypress="handleKeyPress(event)"
                >
                <button id="searchBtn" onclick="search()">搜索推荐</button>
            </div>

            <!-- 加载动画 -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在为你推荐美食...</p>
            </div>

            <!-- 错误提示 -->
            <div class="error" id="error"></div>

            <!-- 结果展示 -->
            <div class="results" id="results">
                <!-- 基本信息 -->
                <div class="info-box" id="infoBox"></div>

                <!-- 餐厅列表 -->
                <h2 style="margin-bottom: 20px; color: #333;">推荐餐厅</h2>
                <div class="restaurants" id="restaurantsList"></div>
            </div>
        </div>

        <div class="footer">
            <p>Restaurant Agent © 2024 | 由 AI 驱动的美食推荐系统</p>
        </div>
    </div>

    <script>
        // 自动获取当前域名和端口，支持本地和服务器部署
        const API_URL = window.location.origin;

        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                search();
            }
        }

        // 搜索推荐
        async function search() {
            const query = document.getElementById('queryInput').value.trim();
            
            if (!query) {
                showError('请输入搜索内容');
                return;
            }

            // 清空之前的结果
            clearResults();
            showLoading(true);
            hideError();

            try {
                const response = await fetch(`${API_URL}/api/recommend`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ query })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const result = await response.json();

                if (result.success) {
                    displayResults(result.data);
                } else {
                    showError(result.message || '推荐失败，请重试');
                }
            } catch (error) {
                console.error('Error:', error);
                showError(`连接失败: ${error.message}。请确保后端服务运行在 ${API_URL}`);
            } finally {
                showLoading(false);
            }
        }

        // 显示结果
        function displayResults(data) {
            // 显示基本信息
            const infoBox = document.getElementById('infoBox');
            infoBox.innerHTML = `
                <div class="info-item">
                    <span class="info-label">查询内容</span>
                    <span class="info-value">${escapeHtml(data.query)}</span>
                </div>
                ${data.city ? `
                <div class="info-item">
                    <span class="info-label">城市</span>
                    <span class="info-value">${escapeHtml(data.city)}</span>
                </div>
                ` : ''}
                ${data.scenario ? `
                <div class="info-item">
                    <span class="info-label">场景</span>
                    <span class="info-value">${escapeHtml(data.scenario)}</span>
                </div>
                ` : ''}
                ${data.filters_applied && Object.keys(data.filters_applied).length > 0 ? `
                <div class="info-item">
                    <span class="info-label">筛选条件</span>
                    <span class="info-value">${JSON.stringify(data.filters_applied)}</span>
                </div>
                ` : ''}
                <div class="info-item">
                    <span class="info-label">找到结果</span>
                    <span class="info-value">${data.total_found} 条 / 推荐 ${data.recommendation_count} 家</span>
                </div>
            `;

            // 显示餐厅列表
            const restaurantsList = document.getElementById('restaurantsList');
            
            if (!data.recommendations || data.recommendations.length === 0) {
                restaurantsList.innerHTML = `
                    <div class="empty" style="grid-column: 1/-1;">
                        <div class="empty-icon">😕</div>
                        <p>暂无推荐结果</p>
                    </div>
                `;
            } else {
                restaurantsList.innerHTML = data.recommendations.map((restaurant, index) => `
                    <div class="restaurant-card">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 10px;">
                            <div class="restaurant-name">${index + 1}. ${escapeHtml(restaurant.name || '未知')}</div>
                        </div>
                        <div class="restaurant-info">
                            ${restaurant.address ? `
                            <div class="restaurant-info-item">
                                <span class="restaurant-info-label">📍 地址</span>
                                <span class="restaurant-info-value">${escapeHtml(restaurant.address)}</span>
                            </div>
                            ` : ''}
                            ${restaurant.telephone ? `
                            <div class="restaurant-info-item">
                                <span class="restaurant-info-label">📞 电话</span>
                                <span class="restaurant-info-value">${escapeHtml(restaurant.telephone)}</span>
                            </div>
                            ` : ''}
                            ${restaurant.rating ? `
                            <div class="restaurant-info-item">
                                <span class="restaurant-info-label">⭐ 评分</span>
                                <span class="rating">${escapeHtml(restaurant.rating)}</span>
                            </div>
                            ` : ''}
                            ${restaurant.cost ? `
                            <div class="restaurant-info-item">
                                <span class="restaurant-info-label">💰 人均</span>
                                <span class="cost">${escapeHtml(restaurant.cost)} 元</span>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `).join('');
            }

            // 显示结果区域
            document.getElementById('results').classList.add('show');
        }

        // 清空结果
        function clearResults() {
            document.getElementById('results').classList.remove('show');
            document.getElementById('infoBox').innerHTML = '';
            document.getElementById('restaurantsList').innerHTML = '';
        }

        // 显示/隐藏加载动画
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        // 显示错误信息
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        // 隐藏错误信息
        function hideError() {
            document.getElementById('error').classList.remove('show');
        }

        // HTML 转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 页面加载完成后的初始化
        window.addEventListener('load', function() {
            console.log('页面加载完成');
            console.log('API 地址:', API_URL);
        });
    </script>
</body>
</html>
